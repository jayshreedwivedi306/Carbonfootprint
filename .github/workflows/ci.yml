name: Carbon Footprint Platform CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-ci:
    name: Backend builds & tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Install Dependencies
        run: |
          cd server
          npm ci

      - name: Prisma Client Generation
        run: |
          cd server
          npx prisma generate

      - name: Security Vulnerability Auditing
        run: |
          cd server
          npm audit --audit-level=high

      - name: Run Backend Unit Tests & Coverage
        run: |
          cd server
          npm run test

      - name: Build Backend Assets
        run: |
          cd server
          npm run build

  frontend-ci:
    name: Frontend builds & lints
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install Dependencies
        run: |
          cd client
          npm ci

      - name: ESLint Static Checks
        run: |
          cd client
          npm run lint

      - name: Build Frontend Application
        run: |
          cd client
          npm run build
