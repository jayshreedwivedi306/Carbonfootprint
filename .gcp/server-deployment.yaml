apiVersion: run.cnrm.cloud.google.com/v1beta1
kind: RunService
metadata:
  name: carbon-server
  namespace: carbon-production
spec:
  template:
    spec:
      serviceAccountName: carbonfootprints@carbonfootprints-500112.iam.gserviceaccount.com
      containers:
        - image: gcr.io/carbonfootprints-500112/carbon-server:latest
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: carbon-db-credentials
                  key: connection_string
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: carbon-secrets
                  key: jwt_secret
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
            requests:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
  traffic:
    - percent: 100
      latestRevision: true
---
apiVersion: run.cnrm.cloud.google.com/v1beta1
kind: RunService
metadata:
  name: carbon-server
spec:
  location: us-central1
  template:
    spec:
      serviceAccountName: carbonfootprints
      containers:
        - image: gcr.io/carbonfootprints-500112/carbon-server:latest
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
