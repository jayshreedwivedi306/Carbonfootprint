version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: carbon_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: carbon_db_password
      POSTGRES_DB: carbonfootprint
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: carbon_api
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: "postgresql://postgres:carbon_db_password@db:5432/carbonfootprint?schema=public"
      JWT_SECRET: "super-secret-docker-compose-key-for-carbon"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: always

  client:
    build: ./client
    container_name: carbon_web
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: always

volumes:
  pgdata:
